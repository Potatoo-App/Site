
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>So Laziz — قائمة طعامك الرقمية</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" href="/favicon.
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold1: #FFCC44;
    --gold2: #E08A00;
    --bg: #111111;
    --card: #1a1a1a;
    --border: #2a2a2a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: #fff;
    font-family: 'Tajawal', sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* ── PRELOADER ── */
  #preloader {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px;
    transition: opacity 0.8s ease, visibility 0.8s ease;
  }
  #preloader.hidden { opacity: 0; visibility: hidden; }

  .loader-ring {
    width: 64px; height: 64px;
    border: 3px solid #222;
    border-top-color: var(--gold1);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  .loader-text {
    color: #555;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

  /* ── CANVAS ── */
  #three-canvas {
    position: fixed; inset: 0; z-index: 0;
    opacity: 0;
    transition: opacity 1.2s ease;
  }
  #three-canvas.visible { opacity: 1; }

  /* ── OVERLAY GRADIENT ── */
  .overlay {
    position: fixed; inset: 0; z-index: 1;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(255,204,68,.07) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 100%, rgba(224,138,0,.05) 0%, transparent 60%),
      linear-gradient(to bottom, rgba(17,17,17,0.3) 0%, rgba(17,17,17,0.7) 60%, rgba(17,17,17,0.95) 100%);
    pointer-events: none;
  }

  /* ── MAIN CONTENT ── */
  #content {
    position: relative; z-index: 2;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 20px;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 1s ease 0.5s, transform 1s ease 0.5s;
  }
  #content.visible { opacity: 1; transform: translateY(0); }

  /* ── LOGO AREA ── */
  .logo-wrap {
    display: flex; flex-direction: column;
    align-items: center; gap: 16px;
    margin-bottom: 32px;
    animation: floatY 4s ease-in-out infinite;
  }
  @keyframes floatY {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-8px); }
  }

  .app-icon {
    width: 100px; height: 100px;
    border-radius: 28px;
    background: linear-gradient(135deg, var(--gold1), var(--gold2));
    display: flex; align-items: center; justify-content: center;
    font-size: 52px;
    box-shadow:
      0 0 0 1px rgba(255,204,68,.2),
      0 20px 60px rgba(255,204,68,.25),
      0 4px 16px rgba(0,0,0,.5);
    position: relative;
    overflow: hidden;
  }
  .app-icon::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,.2), transparent 60%);
  }

  .app-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(42px, 8vw, 72px);
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold1) 0%, var(--gold2) 50%, var(--gold1) 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s linear infinite;
    letter-spacing: -1px;
    text-align: center;
  }
  @keyframes shimmer { to { background-position: 200% center; } }

  .tagline {
    font-size: clamp(14px, 2.5vw, 17px);
    color: rgba(255,255,255,.55);
    text-align: center;
    max-width: 380px;
    line-height: 1.7;
    font-weight: 300;
    letter-spacing: 0.3px;
  }
  .tagline span {
    color: var(--gold1);
    font-weight: 700;
  }

  /* ── DIVIDER ── */
  .divider {
    width: 60px; height: 2px;
    background: linear-gradient(to right, transparent, var(--gold1), transparent);
    margin: 28px auto;
    border-radius: 2px;
  }

  /* ── BUTTONS ── */
  .btns {
    display: flex; gap: 14px;
    flex-wrap: wrap; justify-content: center;
    margin-top: 8px;
  }

  .btn {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 28px;
    border-radius: 14px;
    font-family: 'Tajawal', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
    position: relative;
    overflow: hidden;
    min-width: 160px;
    justify-content: center;
  }
  .btn::before {
    content: '';
    position: absolute; inset: 0;
    background: rgba(255,255,255,.08);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .btn:hover::before { opacity: 1; }
  .btn:hover { transform: translateY(-3px); }
  .btn:active { transform: scale(0.97); }

  .btn-android {
    background: linear-gradient(135deg, var(--gold1), var(--gold2));
    color: #111;
    box-shadow: 0 8px 32px rgba(255,204,68,.3);
  }
  .btn-android:hover { box-shadow: 0 12px 40px rgba(255,204,68,.45); }

  .btn-ios {
    background: transparent;
    color: #fff;
    border: 1.5px solid rgba(255,255,255,.15);
    backdrop-filter: blur(10px);
  }
  .btn-ios:hover { border-color: rgba(255,204,68,.4); color: var(--gold1); }

  .btn-fb {
    background: #1877F2;
    color: #fff;
    box-shadow: 0 8px 24px rgba(24,119,242,.35);
  }
  .btn-fb:hover { box-shadow: 0 12px 32px rgba(24,119,242,.5); }

  .btn svg { width: 20px; height: 20px; flex-shrink: 0; }

  /* ── MODAL ── */
  .modal-backdrop {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,.75);
    backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    opacity: 0; visibility: hidden;
    transition: all 0.3s ease;
  }
  .modal-backdrop.open { opacity: 1; visibility: visible; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px 32px;
    max-width: 360px; width: 100%;
    text-align: center;
    transform: scale(0.85) translateY(20px);
    transition: transform 0.4s cubic-bezier(.34,1.56,.64,1);
    box-shadow: 0 40px 80px rgba(0,0,0,.6);
  }
  .modal-backdrop.open .modal { transform: scale(1) translateY(0); }

  .modal-icon {
    font-size: 52px; margin-bottom: 16px;
    display: block;
    animation: bounce 0.6s ease;
  }
  @keyframes bounce {
    0%   { transform: scale(0); }
    60%  { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  .modal h2 {
    font-size: 22px; font-weight: 900;
    margin-bottom: 10px;
    color: #fff;
  }
  .modal p {
    color: rgba(255,255,255,.5);
    font-size: 14px; line-height: 1.7;
    margin-bottom: 28px;
  }
  .modal p strong { color: var(--gold1); }

  .modal-close {
    width: 100%;
    padding: 13px;
    border-radius: 12px;
    background: var(--border);
    color: #fff;
    border: none;
    font-family: 'Tajawal', sans-serif;
    font-size: 15px; font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }
  .modal-close:hover { background: #333; }

  /* ── FOOTER ── */
  footer {
    position: relative; z-index: 2;
    text-align: center;
    padding: 24px 20px;
    color: rgba(255,255,255,.2);
    font-size: 12px;
    letter-spacing: 1px;
  }
  footer span { color: var(--gold2); }

  /* ── PARTICLES ── */
  .particle {
    position: fixed;
    width: 2px; height: 2px;
    background: var(--gold1);
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;
    z-index: 1;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    .btns { flex-direction: column; align-items: center; }
    .btn { width: 100%; max-width: 280px; }
    .app-icon { width: 80px; height: 80px; font-size: 40px; border-radius: 22px; }
  }
</style>
</head>
<body>

<!-- PRELOADER -->
<div id="preloader">
  <div class="loader-ring"></div>
  <div class="loader-text">So Laziz</div>
</div>

<!-- THREE.JS CANVAS -->
<canvas id="three-canvas"></canvas>

<!-- OVERLAY -->
<div class="overlay"></div>

<!-- MAIN CONTENT -->
<main id="content">
  <div class="logo-wrap">
    <div class="app-icon">🍽️</div>
    <h1 class="app-name">So Laziz</h1>
  </div>

  <p class="tagline">
    قائمة طعامك الرقمية — أنيقة، سريعة، <span>لذيذة</span>
  </p>

  <div class="divider"></div>

  <div class="btns">
    <button class="btn btn-android" onclick="showModal('android')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.6 9.48l1.84-3.18c.16-.31.04-.69-.26-.85a.637.637 0 0 0-.83.22l-1.88 3.24a11.463 11.463 0 0 0-8.94 0L5.65 5.67a.643.643 0 0 0-.87-.2c-.28.18-.37.54-.22.83L6.4 9.48A10.78 10.78 0 0 0 1 18h22a10.78 10.78 0 0 0-5.4-8.52zM7 15.25a1.25 1.25 0 1 1 0-2.5 1.25 1.25 0 0 1 0 2.5zm10 0a1.25 1.25 0 1 1 0-2.5 1.25 1.25 0 0 1 0 2.5z"/></svg>
      تحميل Android
    </button>

    <button class="btn btn-ios" onclick="showModal('ios')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
      تحميل iOS
    </button>

    <a class="btn btn-fb" href="https://www.facebook.com/SoLazizMenus/" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
      تواصل معنا
    </a>
  </div>
</main>

<footer>
  © 2025 <span>So Laziz</span> — جميع الحقوق محفوظة
</footer>

<!-- MODAL -->
<div class="modal-backdrop" id="modal" onclick="closeModalOutside(event)">
  <div class="modal">
    <span class="modal-icon" id="modal-icon">🚀</span>
    <h2 id="modal-title">قريباً!</h2>
    <p id="modal-body">التطبيق <strong>غير متاح الآن</strong> على هذا النظام.<br>نعمل على إطلاقه قريباً، ترقّب!</p>
    <button class="modal-close" onclick="closeModal()">حسناً، سأنتظر!</button>
  </div>
</div>

<!-- THREE.JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── PARTICLES ──────────────────────────────────────────
function createParticles() {
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left: ${Math.random() * 100}vw;
      top: ${Math.random() * 100}vh;
      animation: particleFloat ${4 + Math.random() * 6}s ease-in-out ${Math.random() * 4}s infinite;
      width: ${1 + Math.random() * 2}px;
      height: ${1 + Math.random() * 2}px;
      opacity: ${0.1 + Math.random() * 0.3};
    `;
    document.body.appendChild(p);
  }
}

// ── THREE.JS SCENE ──────────────────────────────────────
function initThree() {
  const canvas = document.getElementById('three-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 0);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, 5);

  // Lights
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
  scene.add(ambientLight);

  const goldLight = new THREE.PointLight(0xFFCC44, 3, 20);
  goldLight.position.set(3, 3, 3);
  scene.add(goldLight);

  const goldLight2 = new THREE.PointLight(0xE08A00, 2, 15);
  goldLight2.position.set(-3, -2, 2);
  scene.add(goldLight2);

  const rimLight = new THREE.DirectionalLight(0xffffff, 0.5);
  rimLight.position.set(0, 5, -5);
  scene.add(rimLight);

  // ── Main dish geometry: torus knot (like a fancy plate swirl)
  const torusGeo = new THREE.TorusKnotGeometry(1.2, 0.35, 128, 16, 2, 3);
  const torusMat = new THREE.MeshStandardMaterial({
    color: 0xFFCC44,
    metalness: 0.9,
    roughness: 0.15,
    envMapIntensity: 1.5,
  });
  const torus = new THREE.Mesh(torusGeo, torusMat);
  scene.add(torus);

  // ── Orbiting spheres (like food dots)
  const sphereGroup = new THREE.Group();
  scene.add(sphereGroup);
  const sphereColors = [0xFFCC44, 0xE08A00, 0xffffff, 0xFFCC44];
  sphereColors.forEach((color, i) => {
    const geo = new THREE.SphereGeometry(0.08 + i * 0.03, 16, 16);
    const mat = new THREE.MeshStandardMaterial({ color, metalness: 0.8, roughness: 0.2, emissive: color, emissiveIntensity: 0.2 });
    const mesh = new THREE.Mesh(geo, mat);
    const angle = (i / sphereColors.length) * Math.PI * 2;
    const radius = 2.2 + i * 0.15;
    mesh.position.set(Math.cos(angle) * radius, Math.sin(angle) * 0.5, Math.sin(angle) * radius * 0.4);
    sphereGroup.add(mesh);
  });

  // ── Floating particles in 3D
  const particleGeo = new THREE.BufferGeometry();
  const count = 200;
  const positions = new Float32Array(count * 3);
  for (let i = 0; i < count * 3; i++) {
    positions[i] = (Math.random() - 0.5) * 20;
  }
  particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const particleMat = new THREE.PointsMaterial({
    color: 0xFFCC44, size: 0.04, transparent: true, opacity: 0.4
  });
  const particles3D = new THREE.Points(particleGeo, particleMat);
  scene.add(particles3D);

  // ── Resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ── Mouse parallax
  let mouseX = 0, mouseY = 0;
  document.addEventListener('mousemove', (e) => {
    mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
    mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
  });

  // ── Intro animation state
  let introProgress = 0;
  let introScale = 0;
  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();

    // Intro scale-in
    if (introScale < 1) {
      introScale = Math.min(1, introScale + 0.015);
      torus.scale.setScalar(introScale * (1 + Math.sin(introScale * Math.PI) * 0.1));
    }

    // Continuous rotation
    torus.rotation.x = t * 0.3 + mouseY * 0.2;
    torus.rotation.y = t * 0.5 + mouseX * 0.3;
    torus.rotation.z = t * 0.1;

    // Orbiting spheres
    sphereGroup.rotation.y = t * 0.4;
    sphereGroup.rotation.x = Math.sin(t * 0.2) * 0.3;

    // Particles drift
    particles3D.rotation.y = t * 0.02;
    particles3D.rotation.x = t * 0.01;

    // Gold light pulse
    goldLight.intensity = 2.5 + Math.sin(t * 2) * 0.8;

    // Camera sway
    camera.position.x += (mouseX * 0.5 - camera.position.x) * 0.05;
    camera.position.y += (-mouseY * 0.3 - camera.position.y) * 0.05;
    camera.lookAt(scene.position);

    renderer.render(scene, camera);
  }
  animate();

  return { canvas };
}

// ── INIT ───────────────────────────────────────────────
window.addEventListener('load', () => {
  createParticles();

  setTimeout(() => {
    try { initThree(); } catch(e) { console.warn('Three.js error:', e); }

    const canvas = document.getElementById('three-canvas');
    canvas.classList.add('visible');

    // Hide preloader
    setTimeout(() => {
      document.getElementById('preloader').classList.add('hidden');
      document.getElementById('content').classList.add('visible');
    }, 600);
  }, 300);
});

// ── MODAL ──────────────────────────────────────────────
function showModal(type) {
  const modal = document.getElementById('modal');
  const icon  = document.getElementById('modal-icon');
  const title = document.getElementById('modal-title');
  const body  = document.getElementById('modal-body');

  if (type === 'android') {
    icon.textContent  = '🤖';
    title.textContent = 'Android — قريباً!';
    body.innerHTML    = 'تطبيق Android <strong>غير متاح الآن</strong>.<br>نعمل على إطلاقه قريباً، ترقّب!';
  } else {
    icon.textContent  = '🍎';
    title.textContent = 'iOS — قريباً!';
    body.innerHTML    = 'تطبيق iOS <strong>غير متاح الآن</strong>.<br>نعمل على إطلاقه قريباً، ترقّب!';
  }

  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});
</script>

<style>
@keyframes particleFloat {
  0%,100% { transform: translateY(0) scale(1); opacity: 0.15; }
  50%      { transform: translateY(-30px) scale(1.5); opacity: 0.4; }
}
</style>
</body>
</html>
